# ================================================================
#  render.yaml — Render.com deployment configuration
#  Docs: https://render.com/docs/blueprint-spec
# ================================================================

services:
  - type: web
    name: ai-study-pal
    runtime: python
    # Install tesseract (OCR engine) then Python dependencies
    buildCommand: apt-get install -y tesseract-ocr && pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
